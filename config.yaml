    - "4+kk"
    - "5+kk"
    - "3+1"
    - "4+1"
    - "5+1"
sources:
  - name: "Sreality Praha 3+kk"
    site: "sreality"
    enabled: false
    url: "https://www.sreality.cz/hledani/pronajem/byty/praha?velikost=3%2Bkk"

  - name: "Sreality Praha 4+kk"
    site: "sreality"
