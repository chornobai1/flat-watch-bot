name: Flat Watch Bot

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flat-watch-bot
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commit updated seen state
        run: |
          git config user.name "flat-watch-bot"
          git config user.email "flat-watch-bot@users.noreply.github.com"

          git add data/seen.json

          if git diff --cached --quiet; then
            echo "No seen.json changes to commit"
            exit 0
          fi

          git commit -m "Update seen listings"
          git pull --rebase origin main
          git push
